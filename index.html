
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Прыг-Скок: Приключение</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; min-height: -webkit-fill-available; color: #fff;
    overflow: auto; user-select: none; -webkit-user-select: none;
    touch-action: auto; overscroll-behavior: auto; position: relative; width: 100%; height: auto;
  }
  #app { width: 100vw; min-height: 100vh; min-height: 100dvh; position: relative; overflow-y: auto; }
  .screen {
    position: relative; min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; transition: opacity 0.4s;
    overflow-y: visible; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .hidden { display: none; }

  #menu { background: radial-gradient(ellipse at center, #2d1b69 0%, #1a1a2e 70%); }
  .title {
    font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900;
    background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(255,107,107,0.3);
    animation: bounce 2s ease-in-out infinite; margin-bottom: 1rem;
    letter-spacing: 2px; text-align: center;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  .subtitle { font-size: clamp(1rem, 3vw, 1.3rem); color: #a0a0c0; margin-bottom: 2rem; text-align: center; padding: 0 1rem; }
  .balance-display {
    position: absolute; top: max(15px, env(safe-area-inset-top)); right: 15px;
    background: rgba(0,0,0,0.5); padding: 0.6rem 1.2rem; border-radius: 30px;
    font-size: 1.2rem; font-weight: bold; backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); border: 2px solid rgba(254,202,87,0.4);
    color: #feca57; z-index: 5;
  }
  .stats-display {
    position: absolute; top: max(15px, env(safe-area-inset-top)); left: 15px;
    background: rgba(0,0,0,0.5); padding: 0.5rem 1rem; border-radius: 30px;
    font-size: 0.9rem; font-weight: bold; backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); border: 2px solid rgba(72,219,251,0.4);
    color: #48dbfb; z-index: 5;
  }
  .btn {
    padding: 1rem 2.5rem; font-size: clamp(1rem, 3vw, 1.3rem); font-weight: bold;
    border: none; border-radius: 50px; cursor: pointer;
    background: linear-gradient(135deg, #ff6b6b, #ee5a6f); color: white;
    box-shadow: 0 8px 20px rgba(238,90,111,0.4); transition: transform 0.15s;
    margin: 0.4rem; min-width: 180px; touch-action: manipulation;
  }
  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: translateY(0) scale(0.97); }
  .btn.secondary { background: linear-gradient(135deg, #48dbfb, #0abde3); }
  .btn.shop { background: linear-gradient(135deg, #feca57, #ff9f43); color: #3d2800; }
  .btn.coin { background: linear-gradient(135deg, #feca57, #ff9f43); color: #3d2800; }
  .btn.wheel { background: linear-gradient(135deg, #a55eea, #8854d0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #levelSelect { background: radial-gradient(ellipse at center, #1e3c72 0%, #1a1a2e 70%); }
  #levelSelect h1 { font-size: clamp(1.8rem, 5vw, 3rem); margin-bottom: 0.5rem; text-align: center; padding: 0 1rem; }
  .levels-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.8rem; max-width: 900px; width: 100%; padding: 1rem;
  }
  .level-card {
    aspect-ratio: 1; border-radius: 20px; cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: bold; border: 3px solid rgba(255,255,255,0.1); touch-action: manipulation;
  }
  .level-card:active:not(.locked) { transform: scale(0.95); }
  .level-card.locked { cursor: not-allowed; filter: grayscale(0.7) brightness(0.5); }
  .level-card.completed { border-color: #26de81; box-shadow: 0 0 20px rgba(38,222,129,0.3); }
  .level-num { font-size: clamp(1.8rem, 5vw, 2.5rem); }
  .level-name { font-size: clamp(0.7rem, 2.2vw, 0.9rem); margin-top: 0.3rem; text-align: center; padding: 0 0.3rem; }
  .level-stars { margin-top: 0.3rem; font-size: clamp(0.9rem, 2.5vw, 1.3rem); }
  .lock-icon { font-size: 2rem; }
  .skip-btn {
    position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.7);
    border: 2px solid rgba(254,202,87,0.6); color: #feca57; font-size: 0.75rem; font-weight: bold;
    padding: 0.2rem 0.5rem; border-radius: 15px; cursor: pointer; z-index: 2;
  }

  #shopScreen { background: radial-gradient(ellipse at center, #3d1b69 0%, #1a1a2e 70%); padding: max(70px, calc(env(safe-area-inset-top) + 70px)) 1rem 2rem; }
  #shopScreen h1 {
    font-size: clamp(2rem, 6vw, 3rem); margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #feca57, #ff9f43);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .shop-subtitle { color: #a0a0c0; margin-bottom: 1rem; text-align: center; padding: 0 1rem; }
  .shop-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; background: rgba(0,0,0,0.3); padding: 0.4rem; border-radius: 30px; flex-wrap: wrap; justify-content: center; }
  .shop-tab {
    padding: 0.6rem 1.2rem; border-radius: 25px; background: transparent; color: #a0a0c0;
    border: none; font-weight: bold; cursor: pointer; font-size: clamp(0.85rem, 2.3vw, 1rem);
  }
  .shop-tab.active { background: linear-gradient(135deg, #feca57, #ff9f43); color: #3d2800; }
  .shop-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem; max-width: 900px; width: 100%; padding: 1rem;
  }
  .skin-card, .bg-card, .ability-card {
    min-height: 200px; border-radius: 20px; cursor: pointer; position: relative;
    transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between; font-weight: bold;
    border: 3px solid rgba(255,255,255,0.15); touch-action: manipulation;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    backdrop-filter: blur(10px); padding: 0.8rem 0.5rem;
  }
  .skin-card:active, .bg-card:active, .ability-card:active { transform: scale(0.95); }
  .skin-card.selected, .bg-card.selected, .ability-card.selected {
    border-color: #26de81; box-shadow: 0 0 25px rgba(38,222,129,0.5);
  }
  .skin-card.owned:not(.selected), .bg-card.owned:not(.selected), .ability-card.owned:not(.selected) {
    border-color: rgba(72,219,251,0.5);
  }
  .skin-preview { width: 80%; height: 90px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .skin-preview canvas { image-rendering: pixelated; width: 100%; height: 100%; }
  .bg-preview { width: 90%; height: 90px; border-radius: 12px; position: relative; overflow: hidden; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .ability-preview {
    width: 80%; height: 90px; border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(2.5rem, 8vw, 3.5rem);
    border: 2px solid rgba(255,255,255,0.2);
    position: relative; flex-shrink: 0;
  }
  .ability-preview::before {
    content: ''; position: absolute; inset: 0; border-radius: 15px;
    background: radial-gradient(circle at center, var(--ab-color, transparent), transparent 70%);
    opacity: 0.3;
  }
  .skin-name, .bg-name, .ability-name { font-size: clamp(0.9rem, 2.5vw, 1.05rem); color: white; text-align: center; margin: 0.3rem 0; }
  .skin-price, .bg-price, .ability-price {
    font-size: clamp(1rem, 2.5vw, 1.15rem); color: #feca57; font-weight: bold;
    background: rgba(0,0,0,0.4); padding: 0.4rem 0.8rem; border-radius: 20px;
    border: 2px solid rgba(254,202,87,0.3);
    display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    margin-top: auto;
  }
  .skin-status, .bg-status, .ability-status {
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7);
    padding: 0.3rem 0.6rem; border-radius: 15px; font-size: 0.8rem; font-weight: bold;
  }
  .skin-status.selected, .bg-status.selected, .ability-status.selected { background: #26de81; color: #000; }
  .skin-status.owned, .bg-status.owned, .ability-status.owned { background: #48dbfb; color: #000; }
  .skin-status.locked, .bg-status.locked, .ability-status.locked { background: rgba(255,107,107,0.8); }
  .ability-desc {
    font-size: clamp(0.7rem, 2vw, 0.8rem); color: #c0c0d0; text-align: center;
    padding: 0 0.3rem; line-height: 1.2;
  }

  #gameScreen { background: #000; }
  #gameCanvas { display: block; image-rendering: pixelated; }
  #hud {
    position: absolute; top: max(10px, env(safe-area-inset-top)); left: 10px; right: 10px;
    display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
    gap: 6px; flex-wrap: wrap; align-items: flex-start;
  }
  .hud-left, .hud-right { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
  .hud-item {
    background: rgba(0,0,0,0.5); padding: 0.4rem 0.9rem; border-radius: 30px;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem); font-weight: bold;
    backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.2); white-space: nowrap;
  }
  #pauseBtn {
    pointer-events: auto; cursor: pointer; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.2); color: white; padding: 0.4rem 0.9rem;
    border-radius: 30px; font-size: clamp(0.85rem, 2.5vw, 1.1rem); font-weight: bold;
  }

  .abilities-bar { display: flex; gap: 6px; pointer-events: auto; }
  .ability-icon {
    width: clamp(40px, 10vw, 50px); height: clamp(40px, 10vw, 50px); border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(1.2rem, 4vw, 1.5rem); position: relative; cursor: pointer;
    touch-action: manipulation; backdrop-filter: blur(10px);
    transition: all 0.2s; overflow: hidden;
  }
  .ability-icon.ready { border-color: #26de81; box-shadow: 0 0 10px rgba(38,222,129,0.5); }
  .ability-icon.active { border-color: #feca57; box-shadow: 0 0 15px rgba(254,202,87,0.8); animation: abilityPulse 0.8s infinite; }
  .ability-icon.cooldown { opacity: 0.6; }
  @keyframes abilityPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  .ability-cd-overlay {
    position: absolute; inset: 0;
    background: conic-gradient(rgba(0,0,0,0.7) var(--cd-pct, 0%), transparent 0%);
    border-radius: 50%; pointer-events: none;
  }
  .ability-key {
    position: absolute; bottom: -4px; right: -4px; background: rgba(0,0,0,0.8);
    color: white; font-size: 0.65rem; font-weight: bold; padding: 1px 5px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
  }

  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(5px); padding: 1rem;
  }
  .modal-content {
    background: linear-gradient(135deg, #2d1b69, #1a1a2e);
    padding: clamp(1.5rem, 4vw, 3rem); border-radius: 25px; text-align: center;
    border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 500px; width: 100%;
  }
  .modal h2 {
    font-size: clamp(1.8rem, 6vw, 3rem); margin-bottom: 1rem;
    background: linear-gradient(90deg, #feca57, #ff6b6b);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .modal p { font-size: clamp(1rem, 3vw, 1.2rem); margin-bottom: 1rem; color: #c0c0d0; }
  .modal-buttons { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
  .modal-buttons .btn { min-width: 130px; padding: 0.8rem 1.5rem; }
  .reward-line { font-size: 1.3rem; color: #feca57; margin: 0.5rem 0; font-weight: bold; }

  #mobileControls {
    position: absolute; bottom: max(15px, env(safe-area-inset-bottom)); left: 0; right: 0;
    display: none; justify-content: space-between; align-items: flex-end;
    padding: 0 15px; pointer-events: none; z-index: 5;
  }
  .mobile-btn {
    pointer-events: auto; width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px);
    border-radius: 50%; background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.35); color: white;
    font-size: clamp(1.5rem, 5vw, 2rem); font-weight: bold;
    backdrop-filter: blur(10px); touch-action: none;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, transform 0.1s;
  }
  .mobile-btn.active { background: rgba(255,255,255,0.35); transform: scale(0.92); }
  .mobile-btn.ability-mobile {
    width: clamp(50px, 12vw, 65px); height: clamp(50px, 12vw, 65px);
    font-size: clamp(1.2rem, 4vw, 1.6rem); position: relative; overflow: hidden;
  }
  .mobile-btn.ability-mobile.ready { border-color: #26de81; box-shadow: 0 0 10px rgba(38,222,129,0.5); }
  .mobile-btn.ability-mobile.active-ability { border-color: #feca57; box-shadow: 0 0 15px rgba(254,202,87,0.8); }
  .mobile-btn.ability-mobile.cooldown { opacity: 0.5; }
  .mobile-group { display: flex; gap: 10px; pointer-events: auto; }
  .mobile-abilities { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; align-items: flex-end; }

  @media (max-width: 900px), (pointer: coarse) {
    #mobileControls { display: flex; }
  }

  #swipeHint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7); padding: 1rem 2rem; border-radius: 20px;
    color: white; font-size: 1rem; text-align: center; pointer-events: none;
    z-index: 20; opacity: 0; transition: opacity 0.5s; backdrop-filter: blur(10px);
  }
  #swipeHint.show { opacity: 1; }

  .fade-in { animation: fadeIn 0.5s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: white; padding: 0.8rem 1.5rem;
    border-radius: 30px; font-weight: bold; z-index: 1000; opacity: 0;
    transition: opacity 0.3s, transform 0.3s; pointer-events: none;
    border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: #26de81; color: #26de81; }
  #toast.error { border-color: #ff6b6b; color: #ff6b6b; }
  #toast.info { border-color: #feca57; color: #feca57; }

  .ability-notice {
    position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 900;
    pointer-events: none; z-index: 15; text-shadow: 0 0 20px currentColor;
    animation: abilityNotice 1.2s forwards;
  }
  @keyframes abilityNotice {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    80% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }

  .wheel-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center; z-index: 200;
    backdrop-filter: blur(8px); padding: 1rem;
  }
  .wheel-container {
    background: linear-gradient(135deg, #2d1b69, #1a1a2e);
    padding: clamp(1.5rem, 4vw, 2.5rem); border-radius: 25px;
    border: 2px solid rgba(254,202,87,0.4); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 500px; width: 100%; text-align: center;
  }
  .wheel-container h2 {
    font-size: clamp(1.8rem, 6vw, 2.5rem); margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #feca57, #ff6b6b, #48dbfb);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .wheel-price { color: #feca57; font-size: 1.1rem; margin-bottom: 1rem; font-weight: bold; }
  .wheel-wrapper {
    position: relative; width: min(85vw, 360px); height: min(85vw, 360px);
    margin: 0 auto 1.5rem;
  }
  .wheel-pointer {
    position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 28px solid #ff6b6b;
    z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .wheel-canvas {
    width: 100%; height: 100%; border-radius: 50%;
    box-shadow: 0 0 30px rgba(254,202,87,0.4), inset 0 0 20px rgba(0,0,0,0.3);
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  }
  .wheel-canvas.spinning { pointer-events: none; }
  .wheel-result {
    font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: bold;
    margin: 1rem 0; min-height: 2rem; color: #feca57;
  }
  .wheel-result.win { color: #26de81; animation: winPulse 0.6s ease-in-out 3; }
  .wheel-result.lose { color: #ff6b6b; }
  @keyframes winPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* XP BAR */
  .xp-bar-container {
    position: absolute; top: 60px; left: 15px; right: 15px;
    background: rgba(0,0,0,0.5); border-radius: 20px; padding: 0.5rem;
    border: 2px solid rgba(165,94,234,0.4);
  }
  .xp-bar {
    height: 20px; background: linear-gradient(90deg, #a55eea, #8854d0);
    border-radius: 10px; transition: width 0.3s;
  }
  .xp-text {
    text-align: center; font-size: 0.85rem; margin-top: 0.3rem;
    color: #a55eea; font-weight: bold;
  }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
    margin: 1rem 0;
  }
  .stat-card {
    background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 15px;
    text-align: center;
  }
  .stat-value { font-size: 1.5rem; font-weight: bold; color: #feca57; }
  .stat-label { font-size: 0.85rem; color: #a0a0c0; margin-top: 0.3rem; }

  /* CUSTOMIZATION */
  .custom-section {
    margin: 1rem 0; padding: 1rem;
    background: rgba(0,0,0,0.2); border-radius: 15px;
  }
  .custom-title {
    font-size: 1rem; font-weight: bold; margin-bottom: 0.8rem;
    color: #feca57;
  }
  .color-picker {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
  }
  .color-option {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer;
    transition: all 0.2s;
  }
  .color-option.selected { border-color: #fff; transform: scale(1.1); }
  .accessory-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
  }
  .accessory-btn {
    padding: 0.5rem; background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
    cursor: pointer; font-size: 1.5rem;
  }
  .accessory-btn.selected { border-color: #26de81; background: rgba(38,222,129,0.2); }
</style>
</head>
<body>
<div id="app">

  <div id="menu" class="screen">
    <div class="stats-display">⭐ Уровень <span id="menuLevel">1</span> | 💰 <span id="menuBalance">0</span></div>
    <div class="xp-bar-container">
      <div class="xp-bar" id="menuXPBar" style="width: 0%"></div>
      <div class="xp-text"><span id="menuXP">0</span> / <span id="menuXPNeed">100</span> XP</div>
    </div>
    <h1 class="title">ПРЫГ-СКОК</h1>
    <p class="subtitle">✨ Большое приключение ✨</p>
    <button class="btn" onclick="showScreen('levelSelect')">▶ ИГРАТЬ</button>
    <button class="btn wheel" onclick="openWheel()"> КОЛЕСО ФОРТУНЫ</button>
    <button class="btn shop" onclick="showScreen('shopScreen')">🛍️ МАГАЗИН</button>
    <button class="btn secondary" onclick="openStats()">📊 СТАТИСТИКА</button>
    <button class="btn secondary" onclick="openCustomization()">🎨 КАСТОМ</button>
    <button class="btn secondary" onclick="resetProgress()">🔄 Сбросить прогресс</button>
  </div>

  <div id="levelSelect" class="screen hidden">
    <div class="balance-display">💰 <span id="levelBalance">0</span></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, onDisconnect, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyB8bnt0qt-WNXy370uXfPHovtanLWtijkQ",
  authDomain: "jump-jump-76abe.firebaseapp.com",
  databaseURL: "https://jump-jump-76abe-default-rtdb.firebaseio.com",
  projectId: "jump-jump-76abe",
  storageBucket: "jump-jump-76abe.firebasestorage.app",
  messagingSenderId: "362335058898",
  appId: "1:362335058898:web:547581de871224ada5a60b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userId = localStorage.getItem('jumpUserId');
if (!userId) {
  userId = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
  localStorage.setItem('jumpUserId', userId);
}

const userStatusRef = ref(db, 'status/' + userId);
const statusRef = ref(db, 'status');
const totalVisitorsRef = ref(db, 'stats/totalVisitors');

function setUserOnline() {
  const updates = {};
  updates['status/' + userId] = { state: 'online', lastSeen: Date.now() };
  updates['stats/totalVisitors'] = increment(1);
  set(ref(db), updates);
  onDisconnect(userStatusRef).set({ state: 'offline', lastSeen: Date.now() });
}

function startOnlineListener() {
  onValue(statusRef, (snapshot) => {
    let count = 0;
    const now = Date.now();
    const fiveMinutesAgo = now - 5 * 60 * 1000;
    if (snapshot.exists()) {
      snapshot.forEach((child) => {
        const data = child.val();
        if (data && data.lastSeen && data.lastSeen > fiveMinutesAgo) count++;
      });
    }
    const onlineEl = document.getElementById('onlineCount');
    if (onlineEl) onlineEl.textContent = count;
  });
}

function startVisitorListener() {
  onValue(totalVisitorsRef, (snapshot) => {
    const count = snapshot.val() || 0;
    const visitorEl = document.getElementById('visitorCount');
    if (visitorEl) visitorEl.textContent = count;
  });
}

setUserOnline();
startOnlineListener();
startVisitorListener();
setInterval(setUserOnline, 30000);

window.addEventListener('beforeunload', () => {
  set(userStatusRef, { state: 'offline', lastSeen: Date.now() });
});

console.log('✅ Firebase подключён! UserID:', userId);
</script>

  const onlineEl = document.getElementById('onlineCount');

function addXP(amount) {
  progress.playerXP += amount;
  while (progress.playerXP >= progress.playerXPNeed) {
    progress.playerXP -= progress.playerXPNeed;
    progress.playerLevel++;
    progress.playerXPNeed = Math.floor(progress.playerXPNeed * 1.5);
    showToast(`🎉 Уровень ${progress.playerLevel}!`, 'success');
  }
  updateUI();
}

  document.getElementById('menuLevel').textContent = progress.playerLevel;

let game = null;
const keys = {};

function initAbilities() {
  return { 
    dash: { cd: 0, active: 0 }, shield: { cd: 0, active: 0 }, magnet: { cd: 0, active: 0 }, 
    slowMo: { cd: 0, active: 0 }, teleport: { cd: 0, active: 0 }, invisibility: { cd: 0, active: 0 },
    doubleJumpUsed: false 
  };
}

function startLevel(num) {
  const levels = makeLevels();
  const data = levels[num - 1];
  game = {
    num, data: JSON.parse(JSON.stringify(data)),
    player: { x: data.spawn.x, y: data.spawn.y, vx: 0, vy: 0, w: 30, h: 40, onGround: false, facing: 1, animTime: 0, shielded: false, invisible: false, dashTrail: [] },
    coins: data.coins.map(c => ({ ...c, collected: false, bob: Math.random() * Math.PI * 2 })),
    enemies: data.enemies.map(e => ({ ...e, dir: 1, w: 30, h: 30 })),
    moving: data.moving.map(m => ({ ...m })),
    spikes: data.spikes, platforms: data.platforms, flag: data.flag,
    particles: [], camera: { shake: 0 },
    lives: 3, collected: 0, running: true, paused: false, won: false, dead: false, time: 0,
    abilities: initAbilities(), slowMoFactor: 1, startTime: Date.now()
  };
  document.getElementById('levelNum').textContent = num;
  updateHUD();
  renderAbilitiesBar();
  renderMobileAbilities();
  showScreen('gameScreen');
  resizeCanvas();
  if (isMobile) showSwipeHint();
  if (!gameLoopRunning) { gameLoopRunning = true; requestAnimationFrame(loop); }
}

function showSwipeHint() {
  const hint = document.getElementById('swipeHint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 2500);
}

function updateHUD() {
  document.getElementById('coinCount').textContent = game.collected;
  document.getElementById('lifeCount').textContent = game.lives;
}

function togglePause() {
  if (!game) return;
  game.paused = !game.paused;
  document.getElementById('pauseBtn').textContent = game.paused ? '▶' : '⏸';
}

function renderAbilitiesBar() {
  const bar = document.getElementById('abilitiesBar');
  bar.innerHTML = '';
  const owned = getOwnedAbilities();
  owned.forEach(id => {
    const cfg = ABILITIES[id];
    if (cfg.passive) return;
    const icon = document.createElement('div');
    icon.className = 'ability-icon';
    icon.dataset.ability = id;
    icon.innerHTML = `<span>${cfg.icon}</span><div class="ability-cd-overlay"></div><div class="ability-key">${cfg.key}</div>`;
    icon.onclick = () => activateAbility(id);
    bar.appendChild(icon);
  });
}

function renderMobileAbilities() {
  const container = document.getElementById('mobileAbilities');
  container.innerHTML = '';
  const owned = getOwnedAbilities();
  const activeAbilities = owned.filter(id => !ABILITIES[id].passive);
  activeAbilities.forEach(id => {
    const cfg = ABILITIES[id];
    const btn = document.createElement('button');
    btn.className = 'mobile-btn ability-mobile';
    btn.dataset.ability = id;
    btn.textContent = cfg.icon;
    container.appendChild(btn);
  });
  const jumpBtn = document.createElement('button');
  jumpBtn.className = 'mobile-btn';
  jumpBtn.dataset.key = 'jump';
  jumpBtn.textContent = '⤴';
  container.appendChild(jumpBtn);

  container.querySelectorAll('.mobile-btn').forEach(btn => {
    const k = btn.dataset.key;
    const abilityId = btn.dataset.ability;
    const press = e => {
      e.preventDefault(); e.stopPropagation();
      if (k) { 
        keys[k] = true; 
        btn.classList.add('active');
        if (k === 'jump') doJump();
      }
      if (abilityId) activateAbility(abilityId);
    };
    const release = e => {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (k) { keys[k] = false; btn.classList.remove('active'); }
    };
    btn.addEventListener('touchstart', press, { passive: false });
    btn.addEventListener('touchend', release, { passive: false });
    btn.addEventListener('touchcancel', release, { passive: false });
    btn.addEventListener('mousedown', press);
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', release);
  });
}

function updateAbilitiesUI() {
  if (!game) return;
  document.querySelectorAll('.ability-icon').forEach(icon => {
    const id = icon.dataset.ability;
    const ab = game.abilities[id];
    const cfg = ABILITIES[id];
    const overlay = icon.querySelector('.ability-cd-overlay');
    icon.classList.remove('ready', 'active', 'cooldown');
    if (ab.active > 0) { icon.classList.add('active'); overlay.style.setProperty('--cd-pct', '0%'); }
    else if (ab.cd > 0) { icon.classList.add('cooldown'); overlay.style.setProperty('--cd-pct', (ab.cd / cfg.cooldown * 100) + '%'); }
    else { icon.classList.add('ready'); overlay.style.setProperty('--cd-pct', '0%'); }
  });
  document.querySelectorAll('.mobile-btn.ability-mobile').forEach(btn => {
    const id = btn.dataset.ability;
    if (!id || !game) return;
    const ab = game.abilities[id];
    btn.classList.remove('ready', 'active-ability', 'cooldown');
    if (ab.active > 0) btn.classList.add('active-ability');
    else if (ab.cd > 0) btn.classList.add('cooldown');
    else btn.classList.add('ready');
  });
}

function activateAbility(id) {
  if (!game || game.paused || game.won || game.dead) return;
  if (!progress.ownedAbilities.includes(id)) { showToast('Купи в магазине!', 'info'); return; }
  const ab = game.abilities[id];
  const cfg = ABILITIES[id];
  if (ab.cd > 0 || ab.active > 0) { showToast(`${cfg.name} перезаряжается`, 'info'); return; }
  
  if (id === 'dash') {
    ab.active = cfg.duration;
    game.player.vx = game.player.facing * cfg.dashSpeed;
    game.player.vy = 0;
    spawnAbilityNotice('⚡ РЫВОК!', cfg.color);
    vibrate(30);
  } else if (id === 'shield') {
    ab.active = cfg.duration;
    game.player.shielded = true;
    spawnAbilityNotice('🛡️ ЩИТ!', cfg.color);
    vibrate(50);
  } else if (id === 'magnet') {
    ab.active = cfg.duration;
    spawnAbilityNotice('🧲 МАГНИТ!', cfg.color);
    vibrate(40);
  } else if (id === 'slowMo') {
    ab.active = cfg.duration;
    game.slowMoFactor = 0.3;
    spawnAbilityNotice('⏳ ЗАМЕДЛЕНИЕ!', cfg.color);
    vibrate(60);
  } else if (id === 'teleport') {
    game.player.x += cfg.teleportDist * game.player.facing;
    if (game.player.x < 0) game.player.x = 0;
    if (game.player.x + game.player.w > GAME_W) game.player.x = GAME_W - game.player.w;
    spawnParticles(game.player.x + 15, game.player.y + 20, 20, cfg.color);
    spawnAbilityNotice(' ТЕЛЕПОРТ!', cfg.color);
    vibrate(40);
  } else if (id === 'invisibility') {
    ab.active = cfg.duration;
    game.player.invisible = true;
    spawnAbilityNotice('👻 НЕВИДИМОСТЬ!', cfg.color);
    vibrate(50);
  }
  
  if (!cfg.passive) ab.cd = cfg.cooldown;
  updateAbilitiesUI();
}

function spawnAbilityNotice(text, color) {
  const notice = document.createElement('div');
  notice.className = 'ability-notice';
  notice.textContent = text;
  notice.style.color = color;
  document.getElementById('gameScreen').appendChild(notice);
  setTimeout(() => notice.remove(), 1200);
}

function updateAbilities() {
  if (!game) return;
  ['dash', 'shield', 'magnet', 'slowMo', 'teleport', 'invisibility'].forEach(id => {
    const ab = game.abilities[id];
    if (ab.cd > 0) ab.cd--;
    if (ab.active > 0) {
      ab.active--;
      if (ab.active === 0) {
        if (id === 'shield') game.player.shielded = false;
        if (id === 'slowMo') game.slowMoFactor = 1;
        if (id === 'invisibility') game.player.invisible = false;
      }
    }
  });
  if (game.abilities.dash.active > 0) {
    game.player.dashTrail.push({ x: game.player.x, y: game.player.y, life: 15 });
    if (game.player.dashTrail.length > 8) game.player.dashTrail.shift();
  } else {
    game.player.dashTrail = game.player.dashTrail.filter(t => { t.life--; return t.life > 0; });
  }
  if (progress.ownedAbilities.includes('magnet') && game.abilities.magnet.active > 0) {
    const p = game.player;
    const pcx = p.x + p.w / 2, pcy = p.y + p.h / 2;
    const radius = ABILITIES.magnet.radius;
    for (const c of game.coins) {
      if (c.collected) continue;
      const dx = pcx - c.x, dy = pcy - c.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius && dist > 0) {
        c.x += (dx / dist) * 8 * (1 - dist / radius);
        c.y += (dy / dist) * 8 * (1 - dist / radius);
      }
    }
  }
}

function doJump() {
  if (!game || game.paused || game.won || game.dead) return;
  const p = game.player;
  
  if (p.onGround) {
    p.vy = -13;
    p.onGround = false;
    game.abilities.doubleJumpUsed = false;
    spawnParticles(p.x + p.w/2, p.y + p.h, 5, '#ffffff');
    progress.stats.jumps++;
    return;
  }
  
  if (progress.ownedAbilities.includes('doubleJump') && !game.abilities.doubleJumpUsed) {
    p.vy = -12;
    game.abilities.doubleJumpUsed = true;
    spawnParticles(p.x + p.w/2, p.y + p.h, 10, '#26de81');
    spawnAbilityNotice('🦘 ДВОЙНОЙ!', '#26de81');
    vibrate(25);
    progress.stats.jumps++;
  }
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if (k === 'escape') togglePause();
  if (k === 'e' && progress.ownedAbilities.includes('dash')) activateAbility('dash');
  if (k === 'q' && progress.ownedAbilities.includes('shield')) activateAbility('shield');
  if (k === 'f' && progress.ownedAbilities.includes('magnet')) activateAbility('magnet');
  if (k === 'z' && progress.ownedAbilities.includes('slowMo')) activateAbility('slowMo');
  if (k === 'x' && progress.ownedAbilities.includes('teleport')) activateAbility('teleport');
  if (k === 'c' && progress.ownedAbilities.includes('invisibility')) activateAbility('invisibility');
  if ((k === ' ' || k === 'arrowup' || k === 'w') && game && !game.paused && !game.won && !game.dead) {
    doJump();
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

document.querySelectorAll('#mobileControls .mobile-btn').forEach(btn => {
  const k = btn.dataset.key;
  const abilityId = btn.dataset.ability;
  const press = e => {
    e.preventDefault(); e.stopPropagation();
    if (k) { 
      keys[k] = true; 
      btn.classList.add('active');
      if (k === 'jump') doJump();
    }
    if (abilityId) activateAbility(abilityId);
  };
  const release = e => {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (k) { keys[k] = false; btn.classList.remove('active'); }
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
});

let touchStartX = 0, touchStartY = 0, touchStartTime = 0, swipeActive = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
  touchStartTime = Date.now(); swipeActive = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!swipeActive) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) { keys['right'] = true; keys['left'] = false; }
    else { keys['left'] = true; keys['right'] = false; }
  }
  if (dy < -30 && Math.abs(dy) > Math.abs(dx)) {
    doJump();
    swipeActive = false;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys['left'] = false; keys['right'] = false; swipeActive = false;
}, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
  const p = game.player;
  const speed = 5, gravity = 0.6;

  if (game.abilities.dash.active > 0) {
    p.vy = 0; p.x += p.vx;
    if (p.x < 0) p.x = 0;
    if (p.x + p.w > GAME_W) p.x = GAME_W - p.w;
    const allPlats = [...game.platforms, ...game.moving];
    for (const plat of allPlats) {
      if (rectOverlap(p, plat)) {
        if (p.vx > 0) p.x = plat.x - p.w;
        else if (p.vx < 0) p.x = plat.x + plat.w;
        p.vx = 0; game.abilities.dash.active = 0;
      }
    }
    checkCollections(); return;
  }

  let moving = false;
  if (keys['arrowleft'] || keys['a'] || keys['left']) { p.vx = -speed; p.facing = -1; moving = true; }
  else if (keys['arrowright'] || keys['d'] || keys['right']) { p.vx = speed; p.facing = 1; moving = true; }
  else { p.vx *= 0.8; }

  p.vy += gravity;
  if (p.vy > 15) p.vy = 15;

  p.x += p.vx;
  const allPlats = [...game.platforms, ...game.moving];
  for (const plat of allPlats) {
    if (rectOverlap(p, plat)) {
      if (p.vx > 0) p.x = plat.x - p.w;
      else if (p.vx < 0) p.x = plat.x + plat.w;
      p.vx = 0;
    }
  }

  p.y += p.vy;
  p.onGround = false;
  for (const plat of allPlats) {
    if (rectOverlap(p, plat)) {
      if (p.vy > 0) {
        p.y = plat.y - p.h; p.vy = 0; p.onGround = true;
        game.abilities.doubleJumpUsed = false;
        if (plat.speed && !plat.vertical) p.x += plat.speed * plat.dir;
      } else if (p.vy < 0) {
        p.y = plat.y + plat.h; p.vy = 0;
      }
    }
  }

  if (p.x < 0) p.x = 0;
  if (p.x + p.w > GAME_W) p.x = GAME_W - p.w;
  if (p.y > 700) hurtPlayer();
  if (moving && p.onGround) p.animTime += 0.3;

  checkCollections();
}

function checkCollections() {
  const p = game.player;
  for (const c of game.coins) {
    if (!c.collected) {
      c.bob += 0.1;
      const cr = { x: c.x - 10, y: c.y - 10 + Math.sin(c.bob)*3, w: 20, h: 20 };
      if (rectOverlap(p, cr)) {
        c.collected = true;
        game.collected++;
        progress.stats.coinsCollected++;
        addXP(5);
        spawnParticles(c.x, c.y, 10, '#feca57');
        updateHUD();
      }
    }
  }
  for (const e of game.enemies) {
    if (e.dead) continue;
    const er = { x: e.x, y: e.y, w: e.w, h: e.h };
    if (rectOverlap(p, er)) {
      if (p.vy > 0 && p.y + p.h - e.y < 20) {
        e.dead = true; p.vy = -9;
        progress.stats.enemiesDefeated++;
        addXP(20);
        spawnParticles(e.x + e.w/2, e.y + e.h/2, 15, '#ff6b6b');
        vibrate(50);
      } else { hurtPlayer(); }
    }
  }
  for (const s of game.spikes) {
    const sr = { x: s.x + 5, y: s.y + 5, w: s.w - 10, h: s.h - 5 };
    if (rectOverlap(p, sr)) hurtPlayer();
  }
  const fr = { x: game.flag.x - 15, y: game.flag.y - 60, w: 30, h: 60 };
  if (rectOverlap(p, fr) && !game.won) winLevel();
}

function hurtPlayer() {
  if (game.dead) return;
  if (game.player.shielded && game.abilities.shield.active > 0) {
    game.player.shielded = false;
    game.abilities.shield.active = 0;
    game.camera.shake = 8;
    spawnParticles(game.player.x + 15, game.player.y + 20, 25, '#48dbfb');
    spawnAbilityNotice('🛡️ ЩИТ СЛОМАН!', '#48dbfb');
    vibrate(60);
    game.player.x = game.data.spawn.x; game.player.y = game.data.spawn.y;
    game.player.vx = 0; game.player.vy = 0;
    return;
  }
  game.lives--;
  progress.stats.deaths++;
  game.camera.shake = 15;
  spawnParticles(game.player.x + 15, game.player.y + 20, 20, '#ff6b6b');
  vibrate([50, 50, 100]);
  updateHUD();
  if (game.lives <= 0) { game.dead = true; setTimeout(showDeathModal, 500); }
  else {
    game.player.x = game.data.spawn.x; game.player.y = game.data.spawn.y;
    game.player.vx = 0; game.player.vy = 0;
  }
}

function winLevel() {
  game.won = true; game.running = false;
  vibrate([100, 50, 100, 50, 200]);
  const total = game.data.totalCoins;
  const stars = game.collected >= total ? 3 : game.collected >= total * 0.6 ? 2 : 1;
  progress.stars[game.num] = Math.max(progress.stars[game.num] || 0, stars);
  if (game.num < 17 && progress.unlocked <= game.num) progress.unlocked = game.num + 1;
  progress.totalCoins += game.collected;
  progress.stats.levelsCompleted++;
  
  const timeTaken = (Date.now() - game.startTime) / 1000;
  if (timeTaken < progress.stats.bestTime || progress.stats.bestTime === 0) {
    progress.stats.bestTime = timeTaken;
  }
  
  addXP(100);
  saveProgress();
  setTimeout(() => showWinModal(stars, game.collected, timeTaken), 500);
}

function showDeathModal() {
  const modal = document.createElement('div');
  modal.className = 'modal fade-in';
  const canContinue = progress.totalCoins >= 5;
  modal.innerHTML = `
    <div class="modal-content">
      <h2>💀 Упс!</h2>
      <p>Ты погиб. Попробуешь ещё раз?</p>
      <div class="modal-buttons">
        <button class="btn" id="retryBtn">🔄 Заново</button>
        <button class="btn coin" id="continueBtn" ${canContinue ? '' : 'disabled'}>💎 Продолжить за 5💰</button>
        <button class="btn secondary" id="backBtn">← К уровням</button>
      </div>
    </div>
  `;
  document.getElementById('gameScreen').appendChild(modal);
  modal.querySelector('#retryBtn').onclick = () => { modal.remove(); startLevel(game.num); };
  modal.querySelector('#continueBtn').onclick = () => {
    if (progress.totalCoins >= 5) {
      progress.totalCoins -= 5; saveProgress(); modal.remove();
      game.dead = false; game.lives = 1;
      game.player.x = game.data.spawn.x; game.player.y = game.data.spawn.y;
      game.player.vx = 0; game.player.vy = 0;
      updateHUD(); updateUI();
      showToast('Продолжаем! -5💰', 'success');
    }
  };
  modal.querySelector('#backBtn').onclick = () => { modal.remove(); showScreen('levelSelect'); };
}

function showWinModal(stars, earned, timeTaken) {
  const modal = document.createElement('div');
  modal.className = 'modal fade-in';
  const isLast = game.num === 17;
  modal.innerHTML = `
    <div class="modal-content">
      <h2>${isLast ? ' ПОБЕДА!' : '✨ Уровень пройден!'}</h2>
      <div style="font-size: clamp(2.5rem, 8vw, 4rem); margin: 1rem 0;">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <p>Монет собрано: ${game.collected} / ${game.data.totalCoins}</p>
      <p>Время: ${timeTaken.toFixed(1)} сек</p>
      ${earned > 0 ? `<div class="reward-line">+${earned} 💰 добавлено!</div>` : '<p style="color:#ff6b6b">Монетки не собраны — попробуй ещё раз!</p>'}
      <div class="modal-buttons">
        ${isLast ? '' : `<button class="btn" id="nextBtn">▶ Далее</button>`}
        <button class="btn secondary" id="backBtn">К уровням</button>
      </div>
    </div>
  `;
  document.getElementById('gameScreen').appendChild(modal);
  const nextBtn = modal.querySelector('#nextBtn');
  if (nextBtn) nextBtn.onclick = () => { modal.remove(); startLevel(game.num + 1); };
  modal.querySelector('#backBtn').onclick = () => { modal.remove(); showScreen('levelSelect'); };
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    game.particles.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 2, life: 30, color, size: Math.random() * 4 + 2 });
  }
}

function updateParticles() {
  for (const p of game.particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--; }
  game.particles = game.particles.filter(p => p.life > 0);
}

function updateEnemies() {
  for (const e of game.enemies) {
    if (e.dead) continue;
    e.x += e.speed * e.dir * game.slowMoFactor;
    if (e.x <= e.minX) e.dir = 1;
    if (e.x + e.w >= e.maxX) e.dir = -1;
  }
}

function updateMoving() {
  for (const m of game.moving) {
    if (m.vertical) {
      m.y += m.speed * m.dir * game.slowMoFactor;
      if (m.y <= m.minY) m.dir = 1;
      if (m.y >= m.maxY) m.dir = -1;
    } else {
      m.x += m.speed * m.dir * game.slowMoFactor;
      if (m.x <= m.minX) m.dir = 1;
      if (m.x >= m.maxX) m.dir = -1;
    }
  }
}

function drawBackground() {
  let bgData;
  if (progress.selectedBg !== 'default') bgData = getCurrentBg();
  else bgData = { type: 'gradient', colors: game.data.bg };

  if (bgData.type === 'rainbow') {
    const t = (game.time * 0.002) % 1;
    const grad = ctx.createLinearGradient(0, 0, GAME_W, GAME_H);
    for (let i = 0; i <= 1; i += 0.2) grad.addColorStop(i, `hsl(${((t + i) * 360) % 360}, 80%, 60%)`);
    ctx.fillStyle = grad;
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
    grad.addColorStop(0, bgData.colors[0]);
    grad.addColorStop(1, bgData.colors[1]);
    ctx.fillStyle = grad;
  }
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  if (bgData.stars || bgData.nebula || bgData.galaxy) drawStarsBg(bgData);
  if (bgData.trees) drawTreesBg();
  if (bgData.sun) drawSunBg();
  if (bgData.waves) drawWavesBg();
  if (bgData.neon) drawNeonBg();
  if (bgData.snow) drawSnowBg();
  if (bgData.lava) drawLavaBg();
  if (bgData.candy) drawCandyBg();
  if (bgData.cyberpunk) drawCyberpunkBg();
  if (bgData.aurora) drawAuroraBg();
  if (bgData.jungle) drawJungleBg();
  if (bgData.deep) drawDeepBg();
  if (bgData.volcano) drawVolcanoBg();
  if (bgData.type === 'gradient' && !bgData.trees && !bgData.sun && !bgData.waves && !bgData.stars && !bgData.neon && !bgData.snow && !bgData.lava && !bgData.candy && !bgData.cyberpunk && !bgData.aurora && !bgData.jungle && !bgData.deep && !bgData.volcano && !bgData.galaxy) drawDefaultClouds();
}

function drawDefaultClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const t = game.time * 0.3;
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 300 + t) % 1400) - 100;
    const cy = 80 + i * 30;
    ctx.beginPath();
    ctx.arc(cx, cy, 25, 0, Math.PI * 2);
    ctx.arc(cx + 25, cy - 5, 30, 0, Math.PI * 2);
    ctx.arc(cx + 55, cy, 25, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStarsBg(bgData) {
  ctx.fillStyle = '#ffffff';
  const count = bgData.galaxy ? 150 : 80;
  for (let i = 0; i < count; i++) {
    const x = (i * 137) % GAME_W;
    const y = (i * 73) % (GAME_H * 0.7);
    ctx.globalAlpha = Math.sin(game.time * 0.05 + i) * 0.5 + 0.5;
    ctx.fillRect(x, y, (i % 3) + 1, (i % 3) + 1);
  }
  ctx.globalAlpha = 1;
  if (bgData.nebula || bgData.galaxy) {
    const grad = ctx.createRadialGradient(400, 200, 0, 400, 200, 300);
    grad.addColorStop(0, 'rgba(255,0,255,0.3)'); grad.addColorStop(1, 'rgba(255,0,255,0)');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
}

function drawTreesBg() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = 0; i < 8; i++) {
    const x = i * 160 + 40;
    ctx.beginPath(); ctx.moveTo(x, 500); ctx.lineTo(x - 30, 400); ctx.lineTo(x + 30, 400); ctx.closePath(); ctx.fill();
  }
}

function drawSunBg() {
  const grad = ctx.createRadialGradient(900, 150, 0, 900, 150, 150);
  grad.addColorStop(0, 'rgba(255,255,200,1)'); grad.addColorStop(0.5, 'rgba(255,200,100,0.5)'); grad.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = grad; ctx.fillRect(700, 0, 400, 300);
}

function drawWavesBg() {
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let w = 0; w < 3; w++) {
    ctx.beginPath(); ctx.moveTo(0, 400 + w * 50);
    for (let i = 0; i <= GAME_W; i += 20) ctx.lineTo(i, 400 + w * 50 + Math.sin((i + game.time * 2 + w * 100) * 0.02) * 15);
    ctx.lineTo(GAME_W, GAME_H); ctx.lineTo(0, GAME_H); ctx.fill();
  }
}

function drawNeonBg() {
  ctx.strokeStyle = 'rgba(255,0,255,0.5)'; ctx.lineWidth = 2;
  for (let i = 0; i < 10; i++) { ctx.beginPath(); ctx.moveTo(0, i * 60); ctx.lineTo(GAME_W, i * 60); ctx.stroke(); }
}

function drawSnowBg() {
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 60; i++) {
    const x = (i * 137 + game.time * 0.5) % GAME_W;
    const y = (i * 73 + game.time * 1.5) % GAME_H;
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(x, y, 2 + (i % 3), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLavaBg() {
  const grad = ctx.createRadialGradient(GAME_W/2, GAME_H, 0, GAME_W/2, GAME_H, 400);
  grad.addColorStop(0, 'rgba(255,100,0,0.5)'); grad.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_W, GAME_H);
}

function drawCandyBg() {
  for (let i = 0; i < 8; i++) {
    const x = (i * 170 + game.time * 0.3) % GAME_W;
    const y = 100 + (i * 50) % 300;
    ctx.fillStyle = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3'][i % 4];
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
  }
}

function drawCyberpunkBg() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  for (let i = 0; i < 10; i++) {
    const x = i * 130; const h = 200 + (i * 37) % 200;
    ctx.fillRect(x, GAME_H - h, 100, h);
  }
}

function drawAuroraBg() {
  for (let i = 0; i < 5; i++) {
    const grad = ctx.createLinearGradient(0, 100 + i * 40, 0, 200 + i * 40);
    grad.addColorStop(0, 'rgba(38,222,129,0)');
    grad.addColorStop(0.5, `rgba(38,222,129,${0.2 + Math.sin(game.time * 0.02 + i) * 0.1})`);
    grad.addColorStop(1, 'rgba(38,222,129,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 100 + i * 40, GAME_W, 100);
  }
}

function drawJungleBg() {
  ctx.strokeStyle = 'rgba(34,139,34,0.6)'; ctx.lineWidth = 3;
  for (let i = 0; i < 6; i++) {
    const x = i * 220 + 100;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.quadraticCurveTo(x + 30, 200, x - 20, 400); ctx.stroke();
  }
}

function drawDeepBg() {
  ctx.fillStyle = 'rgba(100,200,255,0.4)';
  for (let i = 0; i < 5; i++) {
    const x = (i * 280 + game.time * 0.3) % GAME_W;
    const y = 200 + i * 60 + Math.sin(game.time * 0.02 + i) * 30;
    ctx.beginPath(); ctx.ellipse(x, y, 30, 15, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawVolcanoBg() {
  ctx.fillStyle = 'rgba(80,40,20,0.6)';
  for (let i = 0; i < 3; i++) {
    const x = 200 + i * 400;
    ctx.beginPath(); ctx.moveTo(x - 100, 500); ctx.lineTo(x, 200); ctx.lineTo(x + 100, 500); ctx.closePath(); ctx.fill();
  }
}

function drawPlatform(p) {
  ctx.fillStyle = '#20bf6b'; ctx.fillRect(p.x, p.y, p.w, 8);
  ctx.fillStyle = '#8b5a2b'; ctx.fillRect(p.x, p.y + 8, p.w, p.h - 8);
}

function drawCoin(c) {
  if (c.collected) return;
  const y = c.y + Math.sin(c.bob) * 3;
  ctx.save(); ctx.translate(c.x, y);
  ctx.fillStyle = '#feca57'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff9f43'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  if (e.dead) return;
  if (game.player.invisible) ctx.globalAlpha = 0.3;
  ctx.save(); ctx.translate(e.x + e.w/2, e.y + e.h/2);
  ctx.fillStyle = '#ee5a6f'; ctx.beginPath(); ctx.arc(0, 0, e.w/2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-5, -3, 4, 0, Math.PI * 2); ctx.arc(5, -3, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-5 + e.dir, -3, 2, 0, Math.PI * 2); ctx.arc(5 + e.dir, -3, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawSpike(s) {
  ctx.fillStyle = '#576574';
  const count = Math.floor(s.w / 15);
  for (let i = 0; i < count; i++) {
    const x = s.x + i * 15;
    ctx.beginPath(); ctx.moveTo(x, s.y + s.h); ctx.lineTo(x + 7.5, s.y); ctx.lineTo(x + 15, s.y + s.h); ctx.closePath(); ctx.fill();
  }
}

function drawFlag(f) {
  ctx.fillStyle = '#576574'; ctx.fillRect(f.x - 2, f.y - 60, 4, 60);
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath(); ctx.moveTo(f.x + 2, f.y - 60);
  ctx.lineTo(f.x + 30 + Math.sin(game.time * 0.1) * 3, f.y - 50);
  ctx.lineTo(f.x + 2, f.y - 40); ctx.closePath(); ctx.fill();
}

function drawPlayer() {
  const p = game.player;
  const skin = getCurrentSkin();
  const c = skin.colors;

  for (const t of p.dashTrail) {
    ctx.save(); ctx.globalAlpha = t.life / 15 * 0.5;
    ctx.fillStyle = '#feca57'; ctx.fillRect(t.x, t.y, p.w, p.h);
    ctx.restore();
  }

  ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.scale(p.facing, 1);

  if (p.invisible) ctx.globalAlpha = 0.3;

  if (p.shielded && game.abilities.shield.active > 0) {
    ctx.strokeStyle = 'rgba(72,219,251,0.8)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, p.w * 0.9, 0, Math.PI * 2); ctx.stroke();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, p.h/2 + 2, p.w/2, 4, 0, 0, Math.PI * 2); ctx.fill();

  let bodyColor = c.body; let legsColor = c.legs;

  if (c.special === 'rainbow') {
    const grad = ctx.createLinearGradient(-p.w/2, -p.h/2, p.w/2, p.h/2);
    const t = (game.time * 0.05) % 1;
    grad.addColorStop(0, `hsl(${(t * 360)}, 80%, 60%)`);
    grad.addColorStop(0.33, `hsl(${(t * 360 + 120) % 360}, 80%, 60%)`);
    grad.addColorStop(0.66, `hsl(${(t * 360 + 240) % 360}, 80%, 60%)`);
    grad.addColorStop(1, `hsl(${(t * 360 + 360) % 360}, 80%, 60%)`);
    bodyColor = grad; legsColor = grad;
  }

  ctx.fillStyle = bodyColor; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
  ctx.fillStyle = c.belly; ctx.fillRect(-p.w/2 + 5, 0, p.w - 10, p.h/2 - 5);
  ctx.fillStyle = progress.customization.eyeColor; ctx.fillRect(2, -p.h/2 + 8, 10, 10);
  ctx.fillStyle = '#000'; ctx.fillRect(6, -p.h/2 + 11, 4, 5);
  ctx.fillStyle = legsColor;
  const legOffset = p.onGround && Math.abs(p.vx) > 0.5 ? Math.sin(p.animTime) * 3 : 0;
  ctx.fillRect(-p.w/2 + 3, p.h/2 - 5, 8, 5 + legOffset);
  ctx.fillRect(p.w/2 - 11, p.h/2 - 5, 8, 5 - legOffset);

  // Аксессуары
  if (progress.customization.accessory === 'glasses') {
    ctx.fillStyle = '#000';
    ctx.fillRect(-5, -p.h/2 + 10, 15, 5);
  } else if (progress.customization.accessory === 'hat') {
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(-p.w/2, -p.h/2 - 8, p.w, 8);
  }

  // Эффекты
  if (progress.customization.effect === 'fire') {
    ctx.fillStyle = 'rgba(255,100,0,0.6)';
    ctx.beginPath();
    ctx.arc(0, p.h/2 + 10, 8, 0, Math.PI * 2);
    ctx.fill();
  } else if (progress.customization.effect === 'sparkle') {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-15 + i * 10, -p.h/2 - 10 + i * 5, 3, 3);
    }
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of game.particles) {
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.save();
  if (game.camera.shake > 0) {
    ctx.translate((Math.random() - 0.5) * game.camera.shake, (Math.random() - 0.5) * game.camera.shake);
    game.camera.shake *= 0.9;
  }
  drawBackground();
  for (const s of game.spikes) drawSpike(s);
  for (const p of game.platforms) drawPlatform(p);
  for (const m of game.moving) {
    ctx.fillStyle = '#ff9f43'; ctx.fillRect(m.x, m.y, m.w, m.h);
  }
  drawFlag(game.flag);
  for (const c of game.coins) drawCoin(c);
  for (const e of game.enemies) drawEnemy(e);
  drawPlayer();
  drawParticles();
  ctx.restore();
}

let gameLoopRunning = false;
let lastTime = 0;
function loop(ts) {
  if (!gameLoopRunning) return;
  const dt = Math.min(32, ts - lastTime);
  lastTime = ts;
  if (game && game.running && !game.paused && !game.won && !game.dead) {
    game.time++;
    updateMoving();
    updateEnemies();
    updatePlayer();
    updateAbilities();
    updateParticles();
    updateAbilitiesUI();
  }
  if (game) render();
  requestAnimationFrame(loop);
}

function resizeCanvas() {
  canvas.width = GAME_W; canvas.height = GAME_H;
  const app = document.getElementById('app');
  const w = app.clientWidth; const h = app.clientHeight;
  const ratio = GAME_W / GAME_H;
  let cw, ch;
  if (w / h > ratio) { ch = h; cw = h * ratio; }
  else { cw = w; ch = w / ratio; }
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
resizeCanvas();

function renderShop() {
  updateUI();

  grid.innerHTML = '';

  if (currentShopTab === 'skins') {
    SKINS.forEach(skin => {

      let statusHTML = '';

        ? (selected ? '<div class="skin-price" style="color:#26de81">✓ Активен</div>' : '<div class="skin-price" style="color:#48dbfb">Нажми чтобы выбрать</div>')

        ${statusHTML}

        <div class="skin-name">${skin.name}</div>

  } else if (currentShopTab === 'bgs') {
    BACKGROUNDS.forEach(bg => {
      const owned = progress.ownedBgs.includes(bg.id);

      card.className = 'bg-card' + (selected ? ' selected' : '') + (owned ? ' owned' : '');

      const priceHTML = owned
        ? (selected ? '<div class="bg-price" style="color:#26de81">✓ Активен</div>' : '<div class="bg-price" style="color:#48dbfb">Нажми чтобы выбрать</div>')
        : `<div class="bg-price">💰 ${bg.price}</div>`;

      let previewStyle = '';
      if (bg.type === 'rainbow') previewStyle = 'background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #a55eea);';
      else previewStyle = `background: linear-gradient(135deg, ${bg.colors[0]}, ${bg.colors[1]});`;

      card.innerHTML = `
        ${statusHTML}
        <div class="bg-preview" style="${previewStyle}"></div>
        <div class="bg-name">${bg.name}</div>
        ${priceHTML}
      `;

      card.onclick = () => handleBgClick(bg);
      grid.appendChild(card);
    });
  } else if (currentShopTab === 'abilities') {
    ABILITY_ORDER.forEach(id => {
      const cfg = ABILITIES[id];
      const owned = progress.ownedAbilities.includes(id);
      const canAfford = progress.totalCoins >= cfg.price;

      const card = document.createElement('div');
      card.className = 'ability-card' + (owned ? ' owned' : '');

      let statusHTML = '';
      if (owned) statusHTML = '<div class="ability-status owned">✓ Куплено</div>';
      else if (!canAfford) statusHTML = '<div class="ability-status locked">🔒</div>';

      const priceHTML = owned
        ? '<div class="ability-price" style="color:#26de81">✓ Активна</div>'

        <div class="ability-name">${cfg.name}</div>
        <div class="ability-desc">${cfg.desc}</div>
        ${priceHTML}
      `;

      card.onclick = () => handleAbilityClick(cfg);
      grid.appendChild(card);
    });
  }
}

function drawPlayerPreview(pctx, skin, w, h) {
  pctx.clearRect(0, 0, w, h);
  const cx = w / 2; const cy = h / 2;
  const pw = 30; const ph = 40;
  const c = skin.colors;
  let bodyColor = c.body === 'rainbow' ? '#48dbfb' : c.body;

  pctx.fillStyle = bodyColor; pctx.fillRect(cx - pw/2, cy - ph/2, pw, ph);
  pctx.fillStyle = c.belly; pctx.fillRect(cx - pw/2 + 5, cy, pw - 10, ph/2 - 5);
  pctx.fillStyle = c.eye; pctx.fillRect(cx + 2, cy - ph/2 + 8, 10, 10);
  pctx.fillStyle = '#000'; pctx.fillRect(cx + 6, cy - ph/2 + 11, 4, 5);
  pctx.fillStyle = c.legs === 'rainbow' ? '#0abde3' : c.legs;
  pctx.fillRect(cx - pw/2 + 3, cy + ph/2 - 5, 8, 5);
  pctx.fillRect(cx + pw/2 - 11, cy + ph/2 - 5, 8, 5);
}

function handleSkinClick(skin) {
  const owned = progress.ownedSkins.includes(skin.id);
  if (owned) {
    if (progress.selectedSkin === skin.id) { showToast('Уже выбран', 'info'); return; }
    progress.selectedSkin = skin.id; saveProgress(); renderShop();
    showToast(`Скин "${skin.name}" выбран!`, 'success');
  } else {
    if (progress.totalCoins >= skin.price) {
      progress.totalCoins -= skin.price;
      progress.ownedSkins.push(skin.id);
      progress.selectedSkin = skin.id;
      saveProgress(); renderShop();
      showToast(`Куплен "${skin.name}"!`, 'success');
    } else {
      showToast(`Не хватает ${skin.price - progress.totalCoins} 💰`, 'error');
    }
  }
}

function handleBgClick(bg) {
  const owned = progress.ownedBgs.includes(bg.id);
  if (owned) {

    showToast(`Фон "${bg.name}" выбран!`, 'success');

}

function handleAbilityClick(cfg) {
  const owned = progress.ownedAbilities.includes(cfg.id);
  if (owned) { showToast(`"${cfg.name}" уже куплена`, 'info'); return; }
  if (progress.totalCoins >= cfg.price) {
    if (confirm(`Купить "${cfg.name}" за ${cfg.price}💰?\n\n${cfg.desc}`)) {
      progress.totalCoins -= cfg.price;
      progress.ownedAbilities.push(cfg.id);
      saveProgress(); renderShop();

    showToast(`Не хватает ${cfg.price - progress.totalCoins} 💰`, 'error');

}

  saveProgress();
  openCustomization();
  showToast('Эффект изменён!', 'success');
}

const WHEEL_SEGMENTS = [
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: '25💰', type: 'coins', value: 25, color: '#ff9f43', textColor: '#000' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: '50💰', type: 'coins', value: 50, color: '#48dbfb', textColor: '#000' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: '100💰', type: 'coins', value: 100, color: '#26de81', textColor: '#000' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: 'Скин', type: 'skin', color: '#ff6b6b', textColor: '#fff' },
  { label: 'Ничего', type: 'nothing', color: '#576574', textColor: '#fff' },
  { label: '200💰', type: 'coins', value: 200, color: '#feca57', textColor: '#000' },
];

let wheelCanvas, wheelCtx;
let wheelRotation = 0;
let wheelSpinning = false;

function openWheel() {
  if (wheelSpinning) return;
  if (progress.totalCoins < 50) {
    showToast('Нужно 50💰 для вращения!', 'error');
    vibrate(100);
    return;
  }

  const modal = document.createElement('div');
  modal.className = 'wheel-modal fade-in';
  modal.id = 'wheelModal';
  modal.innerHTML = `
    <div class="wheel-container">
      <h2>🎡 Колесо Фортуны</h2>
      <div class="wheel-price">Стоимость: 50 💰</div>
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="360" height="360" class="wheel-canvas"></canvas>
      </div>
      <div class="wheel-result" id="wheelResult"></div>
      <div class="modal-buttons">
        <button class="btn wheel" id="spinBtn">🎯 КРУТИТЬ (50💰)</button>
        <button class="btn secondary" id="closeWheelBtn">Закрыть</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  wheelCanvas = document.getElementById('wheelCanvas');
  wheelCtx = wheelCanvas.getContext('2d');
  wheelRotation = 0;
  wheelSpinning = false;
  drawWheel();

  document.getElementById('spinBtn').onclick = spinWheel;
  document.getElementById('closeWheelBtn').onclick = () => {
    if (wheelSpinning) return;
    modal.remove();
  };
}

function drawWheel() {
  const cx = 180, cy = 180, r = 170;
  wheelCtx.clearRect(0, 0, 360, 360);
  const segCount = WHEEL_SEGMENTS.length;
  const arc = (Math.PI * 2) / segCount;

  for (let i = 0; i < segCount; i++) {
    const seg = WHEEL_SEGMENTS[i];
    const startAngle = i * arc;
    const endAngle = startAngle + arc;

    wheelCtx.beginPath();
    wheelCtx.moveTo(cx, cy);
    wheelCtx.arc(cx, cy, r, startAngle, endAngle);
    wheelCtx.closePath();
    wheelCtx.fillStyle = seg.color;
    wheelCtx.fill();
    wheelCtx.strokeStyle = 'rgba(255,255,255,0.5)';
    wheelCtx.lineWidth = 2;
    wheelCtx.stroke();

    wheelCtx.save();
    wheelCtx.translate(cx, cy);
    wheelCtx.rotate(startAngle + arc / 2);
    wheelCtx.textAlign = 'right';
    wheelCtx.fillStyle = seg.textColor;
    wheelCtx.font = 'bold 16px sans-serif';
    wheelCtx.fillText(seg.label, r - 15, 6);
    wheelCtx.restore();
  }

  wheelCtx.beginPath();
  wheelCtx.arc(cx, cy, 25, 0, Math.PI * 2);
  wheelCtx.fillStyle = '#2d1b69';
  wheelCtx.fill();
  wheelCtx.strokeStyle = '#feca57';
  wheelCtx.lineWidth = 3;
  wheelCtx.stroke();

  wheelCtx.fillStyle = '#feca57';
  wheelCtx.font = 'bold 24px sans-serif';
  wheelCtx.textAlign = 'center';
  wheelCtx.textBaseline = 'middle';
  wheelCtx.fillText('★', cx, cy);
}

function spinWheel() {
  if (wheelSpinning) return;
  if (progress.totalCoins < 50) {
    showToast('Недостаточно монет!', 'error');
    return;
  }

  wheelSpinning = true;
  progress.totalCoins -= 50;
  saveProgress();
  updateUI();

  const spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = true;
  document.getElementById('wheelResult').textContent = '';
  document.getElementById('wheelResult').className = 'wheel-result';

  const winIndex = Math.floor(Math.random() * WHEEL_SEGMENTS.length);
  const segCount = WHEEL_SEGMENTS.length;
  const arc = 360 / segCount;
  const targetAngle = 360 - (winIndex * arc + arc / 2) - 90;
  const fullSpins = 5 + Math.floor(Math.random() * 3);
  const finalRotation = wheelRotation + fullSpins * 360 + (targetAngle - (wheelRotation % 360) + 360) % 360;

  wheelCanvas.classList.add('spinning');
  wheelCanvas.style.transform = `rotate(${finalRotation}deg)`;

  setTimeout(() => {
    wheelSpinning = false;
    wheelRotation = finalRotation;
    wheelCanvas.classList.remove('spinning');
    spinBtn.disabled = false;

    const prize = WHEEL_SEGMENTS[winIndex];
    const resultEl = document.getElementById('wheelResult');

    if (prize.type === 'coins') {
      progress.totalCoins += prize.value;
      saveProgress();
      updateUI();
      resultEl.textContent = `🎉 Выигрыш: ${prize.label}!`;
      resultEl.className = 'wheel-result win';
      showToast(`Выиграно ${prize.value} монет!`, 'success');
      vibrate([100, 50, 100, 50, 200]);
    } else if (prize.type === 'skin') {
      const unowned = SKINS.filter(s => !progress.ownedSkins.includes(s.id));
      if (unowned.length > 0) {
        const won = unowned[Math.floor(Math.random() * unowned.length)];
        progress.ownedSkins.push(won.id);
        progress.selectedSkin = won.id;
        saveProgress();
        resultEl.textContent = ` Скин "${won.name}"!`;
        resultEl.className = 'wheel-result win';
        showToast(`Выигран скин "${won.name}"!`, 'success');
        vibrate([100, 50, 100, 50, 200]);
      } else {
        progress.totalCoins += 100;
        saveProgress();
        updateUI();
        resultEl.textContent = 'Все скины есть! +100💰';
        resultEl.className = 'wheel-result win';
      }
    } else {
      resultEl.textContent = '😔 Ничего...';
      resultEl.className = 'wheel-result lose';
      showToast('Не повезло...', 'info');
      vibrate(100);
    }
  }, 4200);
}

// Init
updateUI();
updateCounters();
renderLevelSelect();
